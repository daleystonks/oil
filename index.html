<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oil Dividend Tracker</title>
    <style>
        /* Global Styles - No text selection allowed anywhere */
        html, body { 
            height: 100%; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a252f; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            cursor: default;
            user-select: none;
            -webkit-user-select: none; 
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        /* Header Section - Doubled height with Gold Border */
        .header-spacer { 
            padding: 50px 20px; 
            text-align: center; 
            background: #2c3e50; 
            border-bottom: 4px solid #d4af37; 
            position: relative; 
            z-index: 10; 
        }

        .header-logo { 
            margin: 0; 
            font-size: 2.2rem; /* Slightly larger now that text is shorter */
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #2ecc71; 
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Footer Section - Matching Gold Border */
        footer {
            padding: 40px 20px;
            background: #2c3e50;
            border-top: 4px solid #d4af37;
            text-align: center;
            color: #bdc3c7;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .market-bar { width: 100%; background: #1a252f; display: flex; justify-content: center; padding: 60px 0 30px 0; }

        .widget-wrapper { position: relative; width: 350px; height: 126px; }
        
        /* The Overlay £ Sign for Brent Widget */
        .widget-wrapper::before {
            content: "£";
            position: absolute;
            left: -2px; 
            top: 47px;      
            font-size: 26px;
            font-weight: bold;
            color: #ffffff;
            z-index: 100;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .widget-container { 
            width: 100%; 
            height: 100%; 
            background: transparent !important; 
            padding-left: 10px; 
            box-sizing: border-box;
            pointer-events: none; 
        }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 20px 60px 20px; overflow-y: auto; }
        
        .container { 
            width: 100%; 
            max-width: 900px; 
            background: #34495e; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; 
            box-sizing: border-box; 
        }

        .income-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 25px; }
        .income-label { text-transform: uppercase; letter-spacing: 2px; color: #bdc3c7; font-size: 0.8em; }
        .big-number { font-size: 4em; font-weight: bold; color: #2ecc71; margin: 10px 0; text-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .avg-yield-text { font-size: 1.1em; color: #3498db; font-weight: 300; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #7f8c8d; text-transform: uppercase; font-size: 0.65em; letter-spacing: 1px; }
        .ticker-name { font-weight: bold; font-size: 1em; color: #ecf0f1; }
        .yield-badge { background: rgba(52, 152, 219, 0.2); color: #3498db; padding: 3px 8px; border-radius: 20px; font-size: 0.8em; border: 1px solid #3498db; }

        @media (max-width: 600px) { 
            .header-spacer, footer { padding: 30px 10px; }
            .header-logo { font-size: 1.4rem; }
            .market-bar { padding: 40px 0 20px 0; }
            .widget-wrapper { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header-spacer">
    <div class="header-logo">OIL DIVIDEND TRACKER</div>
</div>

<div class="market-bar">
    <div class="widget-wrapper">
        <div class="widget-container">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                {
                  "symbol": "TVC:UKOIL",
                  "width": "100%",
                  "colorTheme": "dark",
                  "isTransparent": true,
                  "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>
</div>

<div class="main-wrapper">
    <div class="container">
        <div class="income-header">
            <div class="income-label">Total Annual Dividend Income</div>
            <div id="grand-total-div" class="big-number">£0.00</div>
            <div id="avg-yield" class="avg-yield-text">Portfolio Yield: 0.00%</div>
        </div>
        <table>
            <thead>
                <tr><th>Stock</th><th>Shares</th><th>Annual Payout</th><th>Yield</th></tr>
            </thead>
            <tbody id="div-body"></tbody>
        </table>
    </div>
</div>

<footer>
    <div style="opacity: 0.8;">Synced from Private Control Panel</div>
    <div style="margin-top: 10px; font-size: 0.6rem; opacity: 0.5;">
        Last Update: <span id="last-mod">Checking...</span>
    </div>
</footer>

<script>
    async function loadDividends() {
        const body = document.getElementById('div-body');
        try {
            const response = await fetch('stocks.json?v=' + Date.now());
            if (!response.ok) throw new Error();
            const lastMod = response.headers.get('Last-Modified') || "Just now";
            document.getElementById('last-mod').innerText = lastMod;
            const portfolio = await response.json();
            let totalIncome = 0, totalValue = 0;
            if (!portfolio || portfolio.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color: #bdc3c7;">Portfolio empty.</td></tr>';
            } else {
                body.innerHTML = portfolio.map(s => {
                    const income = (s.shares * s.dividend) / 100;
                    const value = (s.shares * s.price) / 100;
                    totalIncome += income; totalValue += value;
                    return `<tr>
                        <td class="ticker-name">${s.ticker}</td>
                        <td>${s.shares.toLocaleString()}</td>
                        <td style="color: #2ecc71; font-weight: bold;">£${income.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td><span class="yield-badge">${((s.dividend/s.price)*100).toFixed(2)}%</span></td>
                    </tr>`;
                }).join('');
            }
            document.getElementById('grand-total-div').innerText = `£${totalIncome.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            const avgYield = totalValue > 0 ? (totalIncome / totalValue) * 100 : 0;
            document.getElementById('avg-yield').innerText = `Portfolio Yield: ${avgYield.toFixed(2)}%`;
        } catch (e) { body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color: #e74c3c;">Connection Error.</td></tr>'; }
    }
    window.onload = loadDividends;
</script>
</body>
</html>
